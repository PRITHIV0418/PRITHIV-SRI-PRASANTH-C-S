<!DOCTYPE html>
<html>

<head>
    <title>CSS All-in-One Example</title>

    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1503264116251-35a269479413');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            font-family: Arial, sans-serif;
        }

        .box {
            color: darkblue;
            border: 3px solid red;
            background-color: white;
            padding: 20px;
            margin: 20px;
        }

        .font-style {
            font-family: "Times New Roman", serif;
            font-size: 20px;
        }

        .bold {
            font-weight: bold;
        }

        .italic {
            font-style: italic;
        }

        .underline {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h1 class="underline">Demo class in Css</h1>

    <div class="box">
        <p class="font-style">
            This is a <span class="bold">bold</span>,
            <span class="italic">italic</span>, and
            <span class="underline">underlined</span> text example.
        </p>
    </div>

</body>

</html>
