<!DOCTYPE html>
<html lang="en">

<head>
    <title>BOX</title>

    <style>
        .box {
            width: 80%;
            max-width: 600px;
            height: 150px;
            background-color: rgb(173, 175, 230);
            margin: 20px auto;
            text-align: center;
            line-height: 150px;
            font-weight: bold;
        }

        p {
            font-size: 1.5rem;
            text-align: center;
        }

        h1 {
            font-size: 5vw;
            text-align: center;
        }

        body {
            background-color: rgb(151, 162, 130);
        }


        @media (max-width: 768px) {
            body {
                background-color: rgb(26, 211, 36);
            }
        }
    </style>
</head>

<body>

    <h1>This is a paragraph</h1>

    <div class="box">
        BOX
    </div>

    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Debitis quod dolorem consectetur non. Fuga quidem
        impedit laborum in dolore magnam perspiciatis autem animi incidunt aliquam alias sequi amet, asperiores dolorem.
    </p>

</body>

</html>
