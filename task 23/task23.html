<!DOCTYPE html>
<html>

<body>

    <p id="demo">Hello World</p>

    <script>

        document.getElementById("demo").innerText = "Text Changed";


        let el = document.getElementById("demo");


        el.innerHTML = "<b>New Content</b>";


        el.style.color = "blue";
        el.style.fontSize = "24px";
    </script>

</body>

</html>
