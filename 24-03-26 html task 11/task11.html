<!DOCTYPE html>
<html>

<head>
    <title>CSS Methods Example</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>CSS Styling Methods</h1>
    <div style="background-color: lightgreen; padding: 20px; margin: 10px; border: 2px solid green;">
        <h2>Inline CSS</h2>
        <p>This section is styled using inline CSS.</p>
    </div>
    <div class="internal">
        <h2>Internal CSS</h2>
        <p>This section is styled using internal CSS.</p>
    </div>
    <div class="external">
        <h2>External CSS</h2>
        <p>This section is styled using external CSS.</p>
    </div>

</body>

</html>
